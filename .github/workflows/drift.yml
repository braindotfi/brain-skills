name: plugin-check
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Claude Code
        run: npm install --global @anthropic-ai/claude-code@2.1.168
      - name: Check shared MCP reference copies
        run: npm run check:references
      - name: Check skill safety and frontmatter invariants
        run: npm run check:invariants
      - name: Check declared scopes are served
        run: npm run check:scopes
      - name: Validate plugin package
        run: npm test
