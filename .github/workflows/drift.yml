name: drift-check
on:
  push:
    branches: [main]
  pull_request:
jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate skills against spec
        run: node scripts/check-drift.mjs
